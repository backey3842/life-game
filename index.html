<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fff8ef">
  <title>人生游戏化</title>
  <style>
    :root{--bg:#fff8ef;--card:#fffdf9;--ink:#3c2a20;--muted:#8d7d72;--orange:#f36f45;--orange2:#ff9a62;--green:#557764;--green2:#e3eee6;--gold:#e8a820;--line:#eadfd3;--shadow:0 8px 26px rgba(83,55,35,.09);--danger:#c95555}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{background:#f2e9df}body{margin:0;color:var(--ink);background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;min-height:100vh}
    button,input,select{font:inherit}button{cursor:pointer;color:inherit}.app{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:94px;background:var(--bg)}
    .top{position:sticky;top:0;z-index:20;padding:calc(14px + env(safe-area-inset-top)) 18px 12px;background:rgba(255,248,239,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(234,223,211,.8)}
    .topline{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-size:24px;font-weight:900;letter-spacing:-.5px}.date-pill{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 12px;color:var(--green);font-size:13px;font-weight:700}
    main{padding:16px}.page{display:none}.page.active{display:block}.hero{position:relative;overflow:hidden;padding:20px;border-radius:26px;background:linear-gradient(135deg,#f8e3c7 0%,#fffaf1 50%,#e3eee6 100%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7)}
    .hero:after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(243,111,69,.09);right:-70px;top:-80px}.eyebrow{font-size:13px;color:var(--green);font-weight:800}.hero h1{font-size:30px;margin:6px 0 18px;letter-spacing:-1px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}.stat{padding:12px 10px;border-radius:16px;background:rgba(255,253,249,.85);border:1px solid rgba(255,255,255,.8)}.stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.stat b{font-size:20px}.stat:first-child b{color:var(--orange)}.stat:nth-child(3) b{color:var(--green)}
    .section{margin-top:22px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.section h2,.page-title{margin:0;font-size:19px}.linkbtn{border:0;background:none;color:var(--orange);font-weight:800;padding:7px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick{border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px;text-align:left;box-shadow:0 4px 14px rgba(83,55,35,.06);min-height:102px;display:flex;flex-direction:column;justify-content:space-between}.quick:active,.tier:active{transform:scale(.98)}.quick .qtop{display:flex;justify-content:space-between;gap:6px}.quick .qname{font-weight:850}.quick .qicon{font-size:22px}.quick .qmeta{color:var(--muted);font-size:12px;margin-top:3px}.coin{color:var(--orange);font-weight:900}.timeline{padding:4px 16px}.timeline-row{display:grid;grid-template-columns:54px 1fr auto;gap:8px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.timeline-row:last-child{border-bottom:0}.time{font-size:12px;color:var(--muted)}.empty{padding:26px;text-align:center;color:var(--muted)}
    .toolbar{display:flex;gap:8px;margin:12px 0}.toolbar>*{min-width:0}.date-input{flex:1;border:1px solid var(--line);border-radius:13px;background:var(--card);padding:11px 10px;color:var(--ink)}.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:850;background:var(--orange);color:white}.btn.secondary{background:var(--green2);color:var(--green)}.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}.btn.danger{background:#fae7e4;color:var(--danger)}.backfill{display:none;margin-bottom:12px;padding:11px 13px;border-radius:14px;background:#fff0dc;color:#a65e20;font-weight:750;font-size:13px}.backfill.show{display:block}
    .cat-tabs{position:sticky;top:72px;z-index:12;display:flex;gap:8px;overflow-x:auto;padding:8px 0 11px;margin:0 -16px 4px;padding-left:16px;padding-right:16px;background:linear-gradient(var(--bg) 78%,rgba(255,248,239,0));scrollbar-width:none}.cat-tabs::-webkit-scrollbar{display:none}.cat-tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;white-space:nowrap}.cat-tab.active{border-color:var(--green);background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(85,119,100,.22)}.category-summary{display:flex;align-items:center;justify-content:space-between;margin:10px 2px 8px}.category-summary h2{margin:0;font-size:18px}.category-summary small{color:var(--muted)}
    .category{margin:12px 0;overflow:hidden}.cat-head{padding:15px 16px;display:flex;align-items:center;justify-content:space-between;background:#fffaf4;border-bottom:1px solid var(--line)}.cat-name{font-weight:900}.cat-actions{display:flex;gap:4px}.iconbtn{border:0;background:transparent;padding:7px;border-radius:9px;color:var(--muted)}.task{padding:14px 16px;border-bottom:1px solid var(--line)}.task:last-child{border-bottom:0}.task-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.task-title{font-weight:800}.tiers{display:flex;flex-wrap:wrap;gap:8px}.tier{border:1px solid var(--line);background:#fff;padding:10px 11px;border-radius:13px;text-align:left;min-width:110px;position:relative}.tier.favorite{border-color:#e6ad32;background:#fff9e9}.tier .star{position:absolute;right:7px;top:6px;font-size:13px}.tier small{display:block;color:var(--muted);margin-bottom:3px}.task-add{margin-top:10px;border:1px dashed #d9c7b7;background:#fffaf5;color:var(--green);border-radius:11px;padding:8px 10px;font-weight:750}.fab{position:fixed;right:max(18px,calc((100vw - 600px)/2 + 18px));bottom:98px;z-index:15;border:0;border-radius:999px;padding:13px 16px;background:var(--orange);color:#fff;font-weight:900;box-shadow:0 8px 22px rgba(243,111,69,.35)}
    .balance-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.balance{padding:16px}.balance small{color:var(--muted)}.balance b{display:block;font-size:26px;margin-top:3px}.balance.redeem b{color:var(--green)}.reward{padding:16px;margin-top:12px}.reward-top{display:flex;justify-content:space-between;gap:10px}.reward h3{margin:0 0 5px}.reward .cost{font-weight:900;color:var(--orange);font-size:20px}.reward p{color:var(--muted);font-size:13px;margin:7px 0}.progress{height:8px;background:#eee5dc;border-radius:99px;overflow:hidden;margin:13px 0}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--orange2),var(--orange));border-radius:99px}.reward-actions{display:flex;gap:8px;justify-content:flex-end}.redeemed{display:inline-block;color:var(--green);background:var(--green2);padding:7px 10px;border-radius:10px;font-weight:800}
    .month-nav{display:flex;align-items:center;justify-content:space-between;margin:12px 0}.calendar{padding:14px}.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}.week div{font-size:11px;color:var(--muted);padding:5px}.day{aspect-ratio:1;border:0;background:transparent;border-radius:12px;position:relative}.day.has:after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--orange)}.day.selected{background:var(--green);color:white;font-weight:900}.day.selected:after{background:#ffd36a}.day.muted{opacity:.25}.day.today{box-shadow:inset 0 0 0 1px var(--orange)}.day-detail{margin-top:12px;padding:16px}.day-detail h3{margin:0 0 6px}.day-detail .sum{color:var(--orange)}
    .settings-card{padding:16px;margin-top:12px}.settings-card h3{margin:0 0 12px}.setting-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}.setting-row:last-child{border-bottom:0}.hint{font-size:12px;color:var(--muted);line-height:1.6}.nav{position:fixed;z-index:30;bottom:0;left:50%;transform:translateX(-50%);width:min(600px,100%);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,253,249,.96);border-top:1px solid var(--line);backdrop-filter:blur(16px)}.nav button{border:0;background:none;color:#8f837a;font-size:11px;padding:4px}.nav button span{font-size:21px;display:block;margin-bottom:2px}.nav button.active{color:var(--orange);font-weight:800}
    .modal-wrap{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(48,34,25,.38);padding:18px}.modal-wrap.show{display:flex}.modal{width:min(560px,100%);max-height:88vh;overflow:auto;background:var(--card);border-radius:24px;padding:20px;box-shadow:0 20px 60px rgba(40,25,15,.25)}.modal h3{margin:0 0 16px;font-size:20px}.field{margin:12px 0}.field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;color:var(--ink)}.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}.toast{position:fixed;z-index:120;top:calc(78px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-20px);opacity:0;pointer-events:none;background:#3e332c;color:white;border-radius:99px;padding:10px 16px;font-weight:750;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0)}
    .edit-only{display:none}.editing .edit-only{display:inline-flex}.editing .tier{padding-right:32px}.editing .tier:after{content:"✎";position:absolute;right:8px;bottom:8px;color:var(--muted);font-size:12px}.shake{animation:pop .35s}@keyframes pop{50%{transform:scale(1.04)}}
    @media(min-width:700px){body{padding:24px 0}.app{border-radius:30px;overflow:hidden;box-shadow:0 20px 60px rgba(65,40,22,.14);min-height:calc(100vh - 48px)}.nav{bottom:24px;border-radius:0 0 30px 30px}.fab{bottom:120px}}
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="top"><div class="topline"><div class="brand">人生游戏化</div><div class="date-pill" id="topDate"></div></div></header>
  <main>
    <section class="page active" data-page="home"><div id="homeContent"></div></section>
    <section class="page" data-page="tasks">
      <div class="section-head"><h1 class="page-title">任务打卡</h1><button class="btn secondary" id="editToggle">编辑任务</button></div>
      <div class="toolbar"><input id="checkinDate" class="date-input" type="date"><button class="btn ghost" id="todayBtn">回到今天</button></div>
      <div id="backfillBanner" class="backfill"></div><div id="catTabs" class="cat-tabs"></div><div id="taskList"></div>
      <button class="fab edit-only" data-action="add-category">＋ 新建分类</button>
    </section>
    <section class="page" data-page="rewards"><div class="section-head"><h1 class="page-title">奖励商城</h1><button class="btn secondary" data-action="add-reward">＋ 奖励</button></div><div id="rewardContent"></div></section>
    <section class="page" data-page="stats"><div class="section-head"><h1 class="page-title">打卡日历</h1></div><div id="calendarContent"></div></section>
    <section class="page" data-page="settings"><div class="section-head"><h1 class="page-title">设置</h1></div><div id="settingsContent"></div></section>
  </main>
  <nav class="nav" id="nav">
    <button class="active" data-nav="home"><span>⌂</span>首页</button><button data-nav="tasks"><span>✓</span>打卡</button><button data-nav="rewards"><span>🎁</span>奖励</button><button data-nav="stats"><span>▥</span>日历</button><button data-nav="settings"><span>⚙</span>设置</button>
  </nav>
</div>
<div class="modal-wrap" id="modalWrap"><div class="modal" id="modal"></div></div><div class="toast" id="toast"></div><input type="file" id="importFile" accept="application/json" hidden>
<script>
(()=>{'use strict';
const STORE='lifeGameV6', BACKUP='lifeGameV6MigrationBackup';
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const uid=(p='id')=>p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const pad=n=>String(n).padStart(2,'0');
const localDate=(d=new Date())=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=()=>localDate();
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const icons={运动:'🏃',阅读:'📖',学习:'🎓',生活:'🍳',睡前:'🌙',默认:'✨'};
function defaults(){const cats=[['c_move','运动','🏃'],['c_read','阅读','📖'],['c_study','学习','🎓'],['c_life','生活','🍳'],['c_sleep','睡前','🌙']].map((x,i)=>({id:x[0],name:x[1],icon:x[2],order:i}));let n=0;const task=(id,catId,name,tiers)=>({id,catId,name,order:n++,tiers:tiers.map((x,i)=>({id:id+'_'+i,label:x[0],coins:x[1],quick:false,special:x[2]||''}))});return{version:6,categories:cats,tasks:[task('t_self','c_move','运动（自己练）',[['20分钟',10],['40分钟',20]]),task('t_coach','c_move','运动（私教/跟练）',[['1.5小时',20]]),task('t_read','c_read','看书',[['10分钟',5],['30分钟',15]]),task('t_active','c_study','主动思考／刷题',[['15分钟',10],['30分钟',18]]),task('t_video','c_study','视频被动输入',[['30分钟',5],['60分钟',8]]),task('t_long','c_life','看长视频',[['1节',3],['2节',5]]),task('t_cook','c_life','烧饭',[['一荤一素',6],['三菜一汤',15],['快手一锅出',5]]),task('t_sew','c_life','缝纫衣服',[['一件',50]]),task('t_puzzle','c_life','拼图',[['一个',30]]),task('t_wash','c_sleep','刷牙＋洗澡',[['22:00前开始',3,'wash'],['21:00前开始',5,'wash']]),task('t_bed','c_sleep','睡觉',[['23:00前',3,'sleep'],['22:30前',8,'sleep'],['22:00前',12,'sleep']])],checkins:[],rewards:[{id:'r_washer',name:'内衣洗衣烘干机',cost:800},{id:'r_disk',name:'电脑重装换硬盘',cost:400}],redemptions:[],trash:[],legacyEarned:0,dailyGoal:null,createdAt:Date.now()}}
function arrayFrom(obj,names){for(const n of names)if(Array.isArray(obj?.[n]))return obj[n];return[]}
function migrate(raw){const base=defaults();if(!raw||typeof raw!=='object')return base;if(raw.version===6)return {...base,...raw};
  try{const cats=arrayFrom(raw,['categories','taskCategories','cats']);if(cats.length)base.categories=cats.map((c,i)=>({id:String(c.id||uid('c')),name:String(c.name||c.title||'未分类'),icon:c.icon||icons[c.name]||'✨',order:c.order??i,deletedAt:c.deletedAt||null}));
    const oldTasks=arrayFrom(raw,['tasks','customTasks','taskList']);if(oldTasks.length){const migrated=[];oldTasks.forEach((t,i)=>{const catName=t.category||t.categoryName;let catId=t.catId||t.categoryId;if(!catId&&catName){let c=base.categories.find(x=>x.name===catName);if(!c){c={id:uid('c'),name:catName,icon:icons[catName]||'✨',order:base.categories.length};base.categories.push(c)}catId=c.id}catId=catId||base.categories[0]?.id;const tiers=Array.isArray(t.tiers)?t.tiers:Array.isArray(t.levels)?t.levels:[{label:t.tier||t.detail||t.duration||'完成一次',coins:t.coins??t.reward??t.gold??0}];migrated.push({id:String(t.id||uid('t')),catId:String(catId),name:String(t.name||t.title||'自定义任务'),order:t.order??i,deletedAt:t.deletedAt||null,tiers:tiers.map((v,j)=>({id:String(v.id||uid('v')),label:String(v.label||v.name||v.tier||'完成一次'),coins:Number(v.coins??v.reward??v.gold??0),quick:Boolean(v.quick||v.favorite),special:v.special||''}))})});base.tasks=migrated}
    const logs=arrayFrom(raw,['checkins','records','history','logs','entries']);if(logs.length)base.checkins=logs.map(r=>({id:String(r.id||uid('log')),date:String(r.date||r.day||String(r.timestamp||r.time||'').slice(0,10)||today()),ts:Number(r.ts||r.timestamp||r.time||Date.now()),taskId:String(r.taskId||''),tierId:String(r.tierId||r.levelId||''),categoryId:String(r.categoryId||r.catId||''),categoryName:String(r.categoryName||r.category||''),taskName:String(r.taskName||r.name||r.title||'历史打卡'),tierLabel:String(r.tierLabel||r.tier||r.detail||''),coins:Number(r.coins??r.reward??r.gold??0),special:r.special||''}));
    const rewards=arrayFrom(raw,['rewards','goals','rewardGoals']);if(rewards.length)base.rewards=rewards.map(r=>({id:String(r.id||uid('r')),name:String(r.name||r.title||'奖励'),cost:Number(r.cost??r.amount??r.target??0),redeemedAt:r.redeemedAt||null}));
    base.redemptions=arrayFrom(raw,['redemptions','redeemHistory']).map(r=>({id:String(r.id||uid('redeem')),rewardId:r.rewardId||'',name:r.name||'奖励',cost:Number(r.cost||r.amount||0),ts:Number(r.ts||r.time||Date.now())}));base.trash=arrayFrom(raw,['trash','recycleBin']);base.dailyGoal=raw.dailyGoal??raw.todayGoal??null;
    const stated=Number(raw.totalCoins??raw.totalGold??raw.coins??raw.gold??0), logged=base.checkins.reduce((s,x)=>s+x.coins,0);base.legacyEarned=Math.max(0,Number(raw.legacyEarned||0),stated-logged);base.migratedAt=Date.now();base.version=6;return base}catch(e){console.warn('migration failed',e);return base}}
function load(){let own;try{own=JSON.parse(localStorage.getItem(STORE)||'null')}catch{}if(own)return migrate(own);const candidates=['lifeGameV5','lifeGameV5Phase1','life_game_data','lifeGameData','lifeGameState','lifeGame4','lifeGame3'];for(const k of candidates){try{const val=localStorage.getItem(k);if(val){if(!localStorage.getItem(BACKUP))localStorage.setItem(BACKUP,JSON.stringify({key:k,value:val,at:Date.now()}));const m=migrate(JSON.parse(val));m.migratedFrom=k;localStorage.setItem(STORE,JSON.stringify(m));return m}}catch{}}return defaults()}
let state=load(), editing=false, currentPage='home', selectedDate=today(), calCursor=new Date(), selectedCalDate=today(), activeTaskCategory=state.lastTaskCategory||'common';
function save(){state.version=6;localStorage.setItem(STORE,JSON.stringify(state))}
const earned=()=>Math.max(0,Number(state.legacyEarned||0))+state.checkins.reduce((s,x)=>s+Number(x.coins||0),0);
const spent=()=>state.redemptions.reduce((s,x)=>s+Number(x.cost||0),0);
const available=()=>Math.max(0,earned()-spent());
const activeCats=()=>state.categories.filter(x=>!x.deletedAt).sort((a,b)=>(a.order||0)-(b.order||0));
const activeTasks=()=>state.tasks.filter(x=>!x.deletedAt).sort((a,b)=>(a.order||0)-(b.order||0));
function findTier(id){for(const t of state.tasks){const v=t.tiers?.find(x=>x.id===id);if(v)return{task:t,tier:v,cat:state.categories.find(c=>c.id===t.catId)}}}
function fmtDate(s){const d=new Date(s+'T12:00:00');return`${d.getMonth()+1}月${d.getDate()}日`}
function showToast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),1800)}
function render(){renderTop();renderHome();renderTasks();renderRewards();renderCalendar();renderSettings();save()}
function renderTop(){$('#topDate').textContent=new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric',weekday:'short'}).format(new Date())}
function recentQuick(){const fav=[];activeTasks().forEach(t=>t.tiers.forEach(v=>{if(v.quick)fav.push({task:t,tier:v,cat:state.categories.find(c=>c.id===t.catId)})}));if(fav.length)return fav.slice(0,6);const cutoff=new Date();cutoff.setDate(cutoff.getDate()-6);const counts={};state.checkins.filter(x=>x.date>=localDate(cutoff)).forEach(x=>counts[x.tierId]=(counts[x.tierId]||0)+1);const all=[];activeTasks().forEach(t=>t.tiers.forEach(v=>all.push({task:t,tier:v,cat:state.categories.find(c=>c.id===t.catId),count:counts[v.id]||0})));return all.sort((a,b)=>b.count-a.count||a.task.order-b.task.order).slice(0,6)}
function renderHome(){const day=state.checkins.filter(x=>x.date===today()),dayCoins=day.reduce((s,x)=>s+x.coins,0),quick=recentQuick();$('#homeContent').innerHTML=`<div class="hero"><div class="eyebrow">🌱 Lv. ${Math.floor(earned()/100)+1} · 稳步成长</div><h1>今天也在积累自己</h1><div class="stats"><div class="stat"><small>今日获得</small><b>${dayCoins}</b></div><div class="stat"><small>累计金币</small><b>${earned()}</b></div><div class="stat"><small>可兑金币</small><b>${available()}</b></div></div></div><div class="section"><div class="section-head"><h2>⚡ 快速打卡</h2><button class="linkbtn" data-nav-go="tasks">全部任务</button></div><div class="quick-grid">${quick.map(x=>`<button class="quick" data-checkin="${esc(x.tier.id)}"><div class="qtop"><div><div class="qname">${esc(x.task.name)}</div><div class="qmeta">${esc(x.tier.label)}</div></div><div class="qicon">${esc(x.cat?.icon||'✨')}</div></div><div class="coin">＋${x.tier.coins} 金</div></button>`).join('')}</div></div><div class="section"><div class="section-head"><h2>今日时间轴</h2>${day.length?'<button class="linkbtn" data-action="undo">↩ 撤销最后一次</button>':''}</div><div class="card timeline">${day.length?day.slice().sort((a,b)=>a.ts-b.ts).map(rowHtml).join(''):'<div class="empty">今天还没有打卡，完成一件小事吧 ✨</div>'}</div></div>`}
function rowHtml(r){const tm=new Date(r.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});return`<div class="timeline-row"><div class="time">${tm}</div><div><b>${esc(r.taskName)}</b><div class="hint">${esc(r.tierLabel)}</div></div><div class="coin">＋${r.coins}</div></div>`}
function taskBlock(t,tiers=t.tiers){return`<div class="task"><div class="task-head"><div class="task-title">${esc(t.name)}</div><div class="edit-only"><button class="iconbtn" data-action="edit-task" data-id="${t.id}">编辑</button><button class="iconbtn" data-action="delete-task" data-id="${t.id}">删除</button></div></div><div class="tiers">${tiers.map(v=>`<button class="tier ${v.quick?'favorite':''}" data-checkin="${v.id}" ${editing?'data-action="edit-tier"':''}>${v.quick?'<span class="star">⭐</span>':''}<small>${esc(v.label)}</small><span class="coin">＋${v.coins} 金</span></button>`).join('')}</div><button class="task-add edit-only" data-action="add-tier" data-id="${t.id}">＋ 新增档位</button></div>`}
function renderTasks(){const inp=$('#checkinDate');inp.max=today();inp.value=selectedDate;const back=selectedDate!==today(),cats=activeCats();if(activeTaskCategory!=='common'&&!cats.some(c=>c.id===activeTaskCategory))activeTaskCategory='common';$('#backfillBanner').classList.toggle('show',back);$('#backfillBanner').textContent=back?`正在补记 ${fmtDate(selectedDate)}；金币、统计和连续天数会重新计算。`:'';$('#app').classList.toggle('editing',editing);$('#editToggle').textContent=editing?'完成编辑':'编辑任务';
  $('#catTabs').innerHTML=`<button class="cat-tab ${activeTaskCategory==='common'?'active':''}" data-task-cat="common">⭐ 常用</button>${cats.map(c=>`<button class="cat-tab ${activeTaskCategory===c.id?'active':''}" data-task-cat="${c.id}">${esc(c.icon||'✨')} ${esc(c.name)}</button>`).join('')}`;
  if(activeTaskCategory==='common'){const picks=recentQuick(),groups=[];picks.forEach(x=>{let g=groups.find(v=>v.task.id===x.task.id);if(!g){g={task:x.task,tiers:[]};groups.push(g)}g.tiers.push(x.tier)});$('#taskList').innerHTML=`<div class="category-summary"><h2>⭐ 常用任务</h2><small>${picks.some(x=>x.tier.quick)?'我的快捷':'最近7天常用'}</small></div><div class="category card">${groups.length?groups.map(g=>taskBlock(g.task,g.tiers)).join(''):'<div class="empty">打卡几次后，这里会自动显示常用任务</div>'}</div>${editing?'<p class="hint">请切换到具体分类后新增、编辑或删除任务。</p>':''}`;return}
  const c=cats.find(x=>x.id===activeTaskCategory),tasks=activeTasks().filter(t=>t.catId===c.id);$('#taskList').innerHTML=`<div class="category card"><div class="cat-head"><div class="cat-name">${esc(c.icon||'✨')} ${esc(c.name)}</div><div class="cat-actions edit-only"><button class="iconbtn" data-action="add-task" data-id="${c.id}">＋任务</button><button class="iconbtn" data-action="edit-category" data-id="${c.id}">编辑分类</button><button class="iconbtn" data-action="delete-category" data-id="${c.id}">删除</button></div></div>${tasks.length?tasks.map(t=>taskBlock(t)).join(''):'<div class="empty">这个分类还没有任务</div>'}</div>`}
function renderRewards(){const e=earned(),a=available();$('#rewardContent').innerHTML=`<div class="balance-row"><div class="card balance"><small>累计金币 · 永不减少</small><b>${e}</b></div><div class="card balance redeem"><small>可兑金币</small><b>${a}</b></div></div><p class="hint">兑换只扣除可兑金币；你努力获得的累计金币和等级不会减少。</p>${state.rewards.filter(r=>!r.deletedAt).map(r=>{const can=a>=r.cost, pct=Math.min(100,a/r.cost*100);return`<div class="card reward"><div class="reward-top"><div><h3>${esc(r.name)}</h3><div class="cost">${r.cost} 金</div></div><button class="iconbtn" data-action="edit-reward" data-id="${r.id}">编辑</button></div><div class="progress"><i style="width:${pct}%"></i></div><p>${can?'已经攒够，可以兑现啦！':`还差 ${Math.max(0,r.cost-a)} 可兑金币`}</p><div class="reward-actions"><button class="btn danger" data-action="delete-reward" data-id="${r.id}">删除</button><button class="btn" data-action="redeem" data-id="${r.id}" ${can?'':'disabled'} style="${can?'':'opacity:.45'}">兑换</button></div></div>`}).join('')}<div class="section"><div class="section-head"><h2>兑换记录</h2></div><div class="card timeline">${state.redemptions.length?state.redemptions.slice().reverse().map(r=>`<div class="timeline-row"><div class="time">${new Date(r.ts).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})}</div><div><b>${esc(r.name)}</b><div class="hint">已兑现</div></div><div class="coin">−${r.cost}</div></div>`).join(''):'<div class="empty">还没有兑换记录</div>'}</div></div>`}
function monthKey(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}`}
function renderCalendar(){const y=calCursor.getFullYear(),m=calCursor.getMonth(),first=new Date(y,m,1),start=new Date(y,m,1-first.getDay()),cells=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const s=localDate(d),has=state.checkins.some(x=>x.date===s);cells.push(`<button class="day ${d.getMonth()!==m?'muted':''} ${has?'has':''} ${s===selectedCalDate?'selected':''} ${s===today()?'today':''}" data-calendar-date="${s}">${d.getDate()}</button>`)}const rows=state.checkins.filter(x=>x.date===selectedCalDate).sort((a,b)=>a.ts-b.ts),sum=rows.reduce((s,x)=>s+x.coins,0);$('#calendarContent').innerHTML=`<div class="month-nav"><button class="btn ghost" data-action="prev-month">‹</button><b>${y}年${m+1}月</b><button class="btn ghost" data-action="next-month">›</button></div><div class="card calendar"><div class="week">${'日一二三四五六'.split('').map(x=>`<div>${x}</div>`).join('')}</div><div class="days">${cells.join('')}</div></div><div class="card day-detail"><h3>${fmtDate(selectedCalDate)} · <span class="sum">共 ${sum} 金</span></h3><p class="hint">点击日历中的任意日期查看当天明细</p>${rows.length?rows.map(rowHtml).join(''):'<div class="empty">这一天没有打卡记录</div>'}</div>`}
function renderSettings(){const old=state.migratedFrom?`已从 ${esc(state.migratedFrom)} 迁移，旧数据原件仍保留。`:'当前使用新版独立数据区，不会主动删除旧版数据。';$('#settingsContent').innerHTML=`<div class="card settings-card"><h3>今日目标</h3><div class="field"><label>留空表示不设置</label><input id="dailyGoal" type="number" min="0" placeholder="例如 27" value="${state.dailyGoal??''}"></div><button class="btn" data-action="save-goal">保存目标</button></div><div class="card settings-card"><h3>数据安全</h3><div class="setting-row"><div><b>导出 JSON 备份</b><div class="hint">更新网站前建议先导出</div></div><button class="btn secondary" data-action="export">导出</button></div><div class="setting-row"><div><b>导入 JSON</b><div class="hint">兼容本版及常见旧版结构</div></div><button class="btn secondary" data-action="import">导入</button></div><p class="hint">${old}<br>历史打卡保存名称、档位和金币快照；以后修改或删除任务，不会改变过去的记录。</p></div><div class="card settings-card"><h3>回收站</h3>${state.trash.length?state.trash.map(x=>`<div class="setting-row"><div><b>${esc(x.label)}</b><div class="hint">${new Date(x.deletedAt).toLocaleDateString()}</div></div><button class="btn secondary" data-action="restore" data-id="${x.trashId}">恢复</button></div>`).join(''):'<div class="empty">回收站为空</div>'}</div><div class="card settings-card"><h3>危险操作</h3><button class="btn danger" data-action="reset">重置新版数据</button><p class="hint">不会删除旧版本的 localStorage 键。</p></div>`}
function checkin(tierId,date=selectedDate){const f=findTier(tierId);if(!f)return;if(editing){openTierModal(f.task,f.tier);return}if(date>today())return showToast('不能补记未来日期');if(f.tier.special){state.checkins=state.checkins.filter(x=>!(x.date===date&&x.special===f.tier.special));}
  const ts=date===today()?Date.now():new Date(date+'T20:00:00').getTime();state.checkins.push({id:uid('log'),date,ts,taskId:f.task.id,tierId:f.tier.id,categoryId:f.cat?.id||'',categoryName:f.cat?.name||'',taskName:f.task.name,tierLabel:f.tier.label,coins:Number(f.tier.coins),special:f.tier.special||''});
  if(f.tier.special){const ds=state.checkins.filter(x=>x.date===date),w=ds.some(x=>x.special==='wash'),s=ds.some(x=>x.special==='sleep'),egg=ds.find(x=>x.special==='egg');if(w&&s&&!egg)state.checkins.push({id:uid('egg'),date,ts:ts+1,taskId:'bonus',tierId:'bonus_early',categoryId:f.cat?.id||'',categoryName:'睡前',taskName:'早洗＋早睡彩蛋',tierLabel:'联动奖励',coins:1,special:'egg'});if((!w||!s)&&egg)state.checkins=state.checkins.filter(x=>x.id!==egg.id)}
  save();render();showToast(`${date===today()?'打卡成功':'补记成功'} ＋${f.tier.coins} 金`);if(navigator.vibrate)navigator.vibrate(25)}
function undo(){const rows=state.checkins.filter(x=>x.date===today()).sort((a,b)=>b.ts-a.ts);if(!rows.length)return;const id=rows[0].id;state.checkins=state.checkins.filter(x=>x.id!==id&&!(x.date===today()&&x.special==='egg'));render();showToast('已撤销最后一次打卡')}
function modal(html){$('#modal').innerHTML=html;$('#modalWrap').classList.add('show')};function closeModal(){$('#modalWrap').classList.remove('show')}
function fields(title,body,saveAction){modal(`<h3>${title}</h3>${body}<div class="modal-actions"><button class="btn ghost" data-action="close-modal">取消</button><button class="btn" data-action="${saveAction}">保存</button></div>`)}
function categoryModal(c){fields(c?'编辑分类':'新建分类',`<div class="field"><label>分类名称</label><input id="mName" value="${esc(c?.name||'')}"></div><div class="field"><label>图标（可以输入一个 emoji）</label><input id="mIcon" value="${esc(c?.icon||'✨')}"></div><input id="mId" type="hidden" value="${c?.id||''}">`,'save-category')}
function taskModal(t,catId){fields(t?'编辑任务':'新建任务',`<div class="field"><label>任务名称</label><input id="mName" value="${esc(t?.name||'')}"></div><div class="field"><label>所属分类</label><select id="mCat">${activeCats().map(c=>`<option value="${c.id}" ${(t?.catId||catId)===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div><input id="mId" type="hidden" value="${t?.id||''}">`,'save-task')}
function openTierModal(t,v){fields(v?'编辑档位':'新增档位',`<div class="field"><label>档位说明</label><input id="mLabel" value="${esc(v?.label||'')}"></div><div class="field"><label>奖励金币</label><input id="mCoins" type="number" min="0" value="${v?.coins??''}"></div><div class="field"><label>首页快捷</label><select id="mQuick"><option value="0">不设为快捷</option><option value="1" ${v?.quick?'selected':''}>⭐ 设为快捷</option></select></div><input id="mTask" type="hidden" value="${t.id}"><input id="mId" type="hidden" value="${v?.id||''}">`,'save-tier')}
function rewardModal(r){fields(r?'编辑奖励':'新增奖励',`<div class="field"><label>奖励名称</label><input id="mName" value="${esc(r?.name||'')}"></div><div class="field"><label>需要金币</label><input id="mCost" type="number" min="1" value="${r?.cost??''}"></div><input id="mId" type="hidden" value="${r?.id||''}">`,'save-reward')}
function trashEntity(type,id,label){const arr=type==='category'?state.categories:type==='task'?state.tasks:state.rewards,ent=arr.find(x=>x.id===id);if(!ent)return;ent.deletedAt=Date.now();const affected=[];if(type==='category')state.tasks.filter(t=>t.catId===id&&!t.deletedAt).forEach(t=>{t.deletedAt=ent.deletedAt;affected.push(t.id)});const tr={trashId:uid('trash'),type,id,label,affected,deletedAt:ent.deletedAt};state.trash.push(tr);render();showToast('已移入回收站')}
function restore(trashId){const tr=state.trash.find(x=>x.trashId===trashId);if(!tr)return;const arr=tr.type==='category'?state.categories:tr.type==='task'?state.tasks:state.rewards,ent=arr.find(x=>x.id===tr.id);if(ent)ent.deletedAt=null;(tr.affected||[]).forEach(id=>{const t=state.tasks.find(x=>x.id===id);if(t)t.deletedAt=null});state.trash=state.trash.filter(x=>x.trashId!==trashId);render();showToast('已恢复')}
function redeem(id){const r=state.rewards.find(x=>x.id===id);if(!r||available()<r.cost)return;modal(`<h3>确认兑换？</h3><p>将扣除 <b class="coin">${r.cost} 可兑金币</b>，累计金币不会减少。</p><p class="hint">奖励：${esc(r.name)}</p><div class="modal-actions"><button class="btn ghost" data-action="close-modal">取消</button><button class="btn" data-action="confirm-redeem" data-id="${r.id}">确认兑换</button></div>`)}
function doAction(a,el){const id=el.dataset.id;if(a==='undo')return undo();if(a==='add-category')return categoryModal();if(a==='edit-category')return categoryModal(state.categories.find(x=>x.id===id));if(a==='add-task')return taskModal(null,id);if(a==='edit-task')return taskModal(state.tasks.find(x=>x.id===id));if(a==='add-tier')return openTierModal(state.tasks.find(x=>x.id===id));if(a==='edit-tier'){const f=findTier(el.dataset.checkin);return openTierModal(f.task,f.tier)}if(a==='add-reward')return rewardModal();if(a==='edit-reward')return rewardModal(state.rewards.find(x=>x.id===id));if(a==='delete-category')return trashEntity('category',id,state.categories.find(x=>x.id===id)?.name||'分类');if(a==='delete-task')return trashEntity('task',id,state.tasks.find(x=>x.id===id)?.name||'任务');if(a==='delete-reward')return trashEntity('reward',id,state.rewards.find(x=>x.id===id)?.name||'奖励');if(a==='restore')return restore(id);if(a==='redeem')return redeem(id);if(a==='close-modal')return closeModal();
  if(a==='save-category'){const mid=$('#mId').value,name=$('#mName').value.trim(),icon=$('#mIcon').value.trim()||'✨';if(!name)return showToast('请填写分类名称');if(mid)Object.assign(state.categories.find(x=>x.id===mid),{name,icon});else state.categories.push({id:uid('c'),name,icon,order:state.categories.length});closeModal();return render()}
  if(a==='save-task'){const mid=$('#mId').value,name=$('#mName').value.trim(),catId=$('#mCat').value;if(!name)return showToast('请填写任务名称');if(mid)Object.assign(state.tasks.find(x=>x.id===mid),{name,catId});else state.tasks.push({id:uid('t'),name,catId,order:state.tasks.length,tiers:[]});closeModal();return render()}
  if(a==='save-tier'){const mid=$('#mId').value,task=state.tasks.find(x=>x.id===$('#mTask').value),label=$('#mLabel').value.trim(),coins=Number($('#mCoins').value),quick=$('#mQuick').value==='1';if(!label||!Number.isFinite(coins)||coins<0)return showToast('请完整填写档位');if(mid)Object.assign(task.tiers.find(x=>x.id===mid),{label,coins,quick});else task.tiers.push({id:uid('v'),label,coins,quick,special:''});closeModal();return render()}
  if(a==='save-reward'){const mid=$('#mId').value,name=$('#mName').value.trim(),cost=Number($('#mCost').value);if(!name||!Number.isFinite(cost)||cost<=0)return showToast('请完整填写奖励');if(mid)Object.assign(state.rewards.find(x=>x.id===mid),{name,cost});else state.rewards.push({id:uid('r'),name,cost});closeModal();return render()}
  if(a==='confirm-redeem'){const r=state.rewards.find(x=>x.id===id);if(r&&available()>=r.cost)state.redemptions.push({id:uid('redeem'),rewardId:r.id,name:r.name,cost:r.cost,ts:Date.now()});closeModal();render();return showToast('兑换成功 🎉')}
  if(a==='prev-month'||a==='next-month'){calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+(a==='prev-month'?-1:1),1);return renderCalendar()}
  if(a==='save-goal'){const v=$('#dailyGoal').value;state.dailyGoal=v===''?null:Number(v);render();return showToast('今日目标已保存')}
  if(a==='export'){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=`life-game-backup-${today()}.json`;link.click();setTimeout(()=>URL.revokeObjectURL(url),500);return showToast('备份已导出')}
  if(a==='import')return $('#importFile').click();if(a==='reset'){modal(`<h3>确认重置新版数据？</h3><p>此操作不会删除旧版数据键，但会清空当前新版数据。建议先导出 JSON。</p><div class="modal-actions"><button class="btn ghost" data-action="close-modal">取消</button><button class="btn danger" data-action="confirm-reset">确认重置</button></div>`);return}if(a==='confirm-reset'){state=defaults();localStorage.setItem(STORE,JSON.stringify(state));closeModal();return render()}}
function go(page){currentPage=page;$$('.page').forEach(x=>x.classList.toggle('active',x.dataset.page===page));$$('#nav button').forEach(x=>x.classList.toggle('active',x.dataset.nav===page));if(page==='stats'){selectedCalDate=today();calCursor=new Date();renderCalendar()}window.scrollTo({top:0,behavior:'smooth'})}
document.addEventListener('click',e=>{const nav=e.target.closest('[data-nav],[data-nav-go]');if(nav)return go(nav.dataset.nav||nav.dataset.navGo);const tab=e.target.closest('[data-task-cat]');if(tab){activeTaskCategory=tab.dataset.taskCat;state.lastTaskCategory=activeTaskCategory;save();return renderTasks()}const ci=e.target.closest('[data-checkin]');if(ci)return checkin(ci.dataset.checkin);const ac=e.target.closest('[data-action]');if(ac)return doAction(ac.dataset.action,ac);if(e.target===$('#modalWrap'))closeModal()});
$('#editToggle').addEventListener('click',()=>{editing=!editing;if(editing&&activeTaskCategory==='common')activeTaskCategory=activeCats()[0]?.id||'common';state.lastTaskCategory=activeTaskCategory;save();renderTasks()});$('#checkinDate').addEventListener('change',e=>{selectedDate=e.target.value||today();renderTasks()});$('#todayBtn').addEventListener('click',()=>{selectedDate=today();renderTasks()});
document.addEventListener('click',e=>{const d=e.target.closest('[data-calendar-date]');if(d){selectedCalDate=d.dataset.calendarDate;renderCalendar()}});
$('#importFile').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const raw=JSON.parse(await f.text());localStorage.setItem(BACKUP,JSON.stringify({key:'import-before',value:JSON.stringify(state),at:Date.now()}));state=migrate(raw);save();render();showToast('数据导入成功')}catch{showToast('文件无法识别')}e.target.value=''});
render();
})();
</script>
</body></html>
