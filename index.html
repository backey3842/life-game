const DEFAULT={version:5,dailyGoal:null,targetMode:'selected',customTarget:null,editMode:false,categories:[{id:'c_move',name:'运动',order:1},{id:'c_read',name:'阅读',order:2},{id:'c_learn',name:'学习',order:3},{id:'c_life',name:'生活',order:4},{id:'c_sleep',name:'睡前',order:5}],tasks:[{id:'t_self',categoryId:'c_move',name:'自己练',order:1},{id:'t_coach',categoryId:'c_move',name:'私教/跟练',order:2},{id:'t_book',categoryId:'c_read',name:'看书',order:1},{id:'t_active',categoryId:'c_learn',name:'主动思考/刷题',order:1},{id:'t_video',categoryId:'c_learn',name:'看视频被动输入',order:2},{id:'t_long',categoryId:'c_life',name:'看长视频',order:1},{id:'t_cook',categoryId:'c_life',name:'烧饭',order:2},{id:'t_sew',categoryId:'c_life',name:'缝纫衣服',order:3},{id:'t_puzzle',categoryId:'c_life',name:'拼图',order:4},{id:'t_wash',categoryId:'c_sleep',name:'刷牙+洗澡',order:1},{id:'t_bed',categoryId:'c_sleep',name:'睡觉',order:2}],tiers:[{id:'x_self20',taskId:'t_self',name:'20分钟',coins:10},{id:'x_self40',taskId:'t_self',name:'40分钟',coins:20},{id:'x_coach',taskId:'t_coach',name:'1.5小时',coins:20},{id:'x_book10',taskId:'t_book',name:'10分钟',coins:5},{id:'x_book30',taskId:'t_book',name:'30分钟',coins:15},{id:'x_active15',taskId:'t_active',name:'15分钟',coins:10},{id:'x_active30',taskId:'t_active',name:'30分钟',coins:18},{id:'x_video30',taskId:'t_video',name:'30分钟',coins:5},{id:'x_video60',taskId:'t_video',name:'60分钟',coins:8},{id:'x_long1',taskId:'t_long',name:'1节',coins:3},{id:'x_long2',taskId:'t_long',name:'2节',coins:5},{id:'x_cook1',taskId:'t_cook',name:'一荤一素',coins:6},{id:'x_cook2',taskId:'t_cook',name:'三菜一汤',coins:15},{id:'x_cook3',taskId:'t_cook',name:'快手一锅出',coins:5},{id:'x_sew',taskId:'t_sew',name:'一件',coins:50},{id:'x_puzzle',taskId:'t_puzzle',name:'一个',coins:30},{id:'x_wash22',taskId:'t_wash',name:'22:00前开始',coins:3,sleepType:'wash',rank:1},{id:'x_wash21',taskId:'t_wash',name:'21:00前开始',coins:5,sleepType:'wash',rank:2},{id:'x_bed23',taskId:'t_bed',name:'23:00前',coins:3,sleepType:'bed',rank:1},{id:'x_bed2230',taskId:'t_bed',name:'22:30前',coins:8,sleepType:'bed',rank:2},{id:'x_bed22',taskId:'t_bed',name:'22:00前',coins:12,sleepType:'bed',rank:3}],favorites:[],goals:[{id:'g_washer',name:'内衣洗衣烘干机',amount:800},{id:'g_disk',name:'电脑重装换硬盘',amount:400}],selectedGoalIds:['g_washer','g_disk'],days:{},recycle:[]};
function normalize(x){const s=Object.assign(clone(DEFAULT),x||{});['categories','tasks','tiers','favorites','goals','selectedGoalIds','recycle'].forEach(k=>{if(!Array.isArray(s[k]))s[k]=clone(DEFAULT[k])});if(!s.days||typeof s.days!=='object')s.days={};cleanupRecycle(s);return s}function loadState(){const fresh=JSON.parse(localStorage.getItem('lifeGame5')||'null');if(fresh)return normalize(fresh);const old=JSON.parse(localStorage.getItem('lifeGamifiedCheckin_v1')||'null');if(!old)return clone(DEFAULT);const s=clone(DEFAULT);s.dailyGoal=old.dailyGoal||null;s.targetMode=old.targetMode==='custom'?'custom':'selected';s.customTarget=old.customTotalTarget||null;s.goals=Array.isArray(old.goals)?old.goals:s.goals;s.selectedGoalIds=Array.isArray(old.selectedGoalIds)?old.selectedGoalIds:s.selectedGoalIds;s.days=old.days&&typeof old.days==='object'?old.days:{};(old.customTasks||[]).forEach((o,i)=>{let c=s.categories.find(x=>x.name===o.group);if(!c){c={id:uid('c'),name:o.group||'自定义',order:s.categories.length+1};s.categories.push(c)}const t={id:uid('t'),categoryId:c.id,name:o.group||'自定义任务',order:i+1};s.tasks.push(t);s.tiers.push({id:o.id||uid('x'),taskId:t.id,name:o.tier||'完成一次',coins:Number(o.coins)||1})});localStorage.setItem('lifeGame5',JSON.stringify(s));return normalize(s)}let state=loadState();function save(){localStorage.setItem('lifeGame5',JSON.stringify(state))}function cleanupRecycle(s){const cutoff=Date.now()-30*864e5;s.recycle=(s.recycle||[]).filter(x=>x.deletedAt>cutoff)}
function day(k=dk()){if(!state.days[k])state.days[k]={records:[],sleep:{}};return state.days[k]}function total(){return Object.values(state.days).reduce((a,d)=>a+(d.records||[]).reduce((s,r)=>s+Number(r.coins||0),0),0)}function dayCoins(k=dk()){return (state.days[k]?.records||[]).reduce((s,r)=>s+Number(r.coins||0),0)}function streak(){let n=0,d=new Date();while(dayCoins(dk(d))>0){n++;d.setDate(d.getDate()-1)}return n}function cat(id){return state.categories.find(x=>x.id===id)}function task(id){return state.tasks.find(x=>x.id===id)}function tier(id){return state.tiers.find(x=>x.id===id)}function label(x){const t=task(x.taskId),c=t&&cat(t.categoryId);return {category:c?.name||'未分类',task:t?.name||'未知任务'}}

function punch(id){const x=tier(id);if(!x)return;const info=label(x),d=day();if(x.sleepType){const old=d.sleep[x.sleepType];if(old){d.records=d.records.filter(r=>r.recordId!==old.recordId)}const rec={recordId:uid('r'),tierId:x.id,category:info.category,task:info.task,tier:x.name,coins:x.coins,time:Date.now(),sleepType:x.sleepType};d.sleep[x.sleepType]=rec;d.records.push(rec);applyEaster(d)}else d.records.push({recordId:uid('r'),tierId:x.id,category:info.category,task:info.task,tier:x.name,coins:x.coins,time:Date.now()});capSleep(d);save();renderAll();toast('+'+x.coins+' 金币')}function applyEaster(d){d.records=d.records.filter(r=>r.recordId!=='easter');const w=d.sleep.wash,b=d.sleep.bed;if(w&&b&&tier(w.tierId)?.rank===2)d.records.push({recordId:'easter',tierId:'easter',category:'睡前',task:'联动彩蛋',tier:'早洗+早睡',coins:1,time:Date.now()});capSleep(d)}function capSleep(d){const sleep=d.records.filter(r=>r.sleepType||r.recordId==='easter'),sum=sleep.reduce((s,r)=>s+r.coins,0);if(sum>18){const over=sum-18;d.records.push({recordId:uid('cap'),tierId:'cap',category:'睡前',task:'睡前封顶调整',tier:'每日封顶18金',coins:-over,time:Date.now()})}d.records=d.records.filter((r,i,a)=>r.tierId!=='cap'||i===a.map(x=>x.tierId).lastIndexOf('cap'))}

function taskButton(x){const l=label(x),fav=state.favorites.includes(x.id);return `<button class="task" data-punch="${x.id}"><strong>${esc(l.task)}</strong><small>${esc(x.name)}</small><span class="coin">+${x.coins}金</span>${state.editMode?`<span class="star" data-star="${x.id}">${fav?'⭐':'☆'}</span>`:''}</button>`}
function renderHeader(){const t=total(),lv=Math.floor(t/100)+1,xp=t%100;$('dateText').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});$('todayCoins').textContent=dayCoins();$('totalCoins').textContent=t;$('streak').textContent=streak()+'天';$('levelText').textContent='Lv.'+lv+' '+(lv<3?'新手':lv<6?'探索者':'长期主义者');$('xpText').textContent=xp+'/100 XP';$('xpBar').style.width=xp+'%';$('avatar').textContent=t<100?'🌱':t<500?'🌿':t<1200?'🌳':'🏡'}
function renderHome(){const dg=Number(state.dailyGoal||0),tc=dayCoins();$('dailyGoalText').textContent=dg?`今日目标 ${tc}/${dg} 金`:'今日目标暂未设置';$('dailyBar').style.width=(dg?Math.min(100,tc/dg*100):0)+'%';const ta=targetAmount(),tt=total();$('targetText').textContent=ta?`奖励目标 ${tt}/${ta} 金`:'奖励目标暂未设置';$('targetBar').style.width=(ta?Math.min(100,tt/ta*100):0)+'%';$('quickTasks').innerHTML=quick().length?`<div class="grid">${quick().map(taskButton).join('')}</div>`:'<div class="empty">还没有可用任务</div>';const rs=day().records;$('todayRecords').innerHTML=rs.length?rs.slice().reverse().map(r=>`<div class="record"><div class="record-main"><b>${esc(r.task)} · ${esc(r.tier)}</b><small class="muted">${new Date(r.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})} · ${r.coins>=0?'+':''}${r.coins}金</small></div></div>`).join(''):'<div class="empty">今天还没有打卡</div>'}
function renderLibrary(){const cats=state.categories.slice().sort((a,b)=>a.order-b.order);$('editBanner').classList.toggle('show',state.editMode);$('toggleEdit').textContent=state.editMode?'完成编辑':'编辑模式';$('taskLibrary').innerHTML=cats.map(c=>{const ts=state.tasks.filter(t=>t.categoryId===c.id).sort((a,b)=>a.order-b.order);return `<div class="card cat"><div class="cat-title"><span>${esc(c.name)}</span>${state.editMode?`<span><button class="icon-btn" data-edit-cat="${c.id}">编辑</button> <button class="icon-btn danger" data-delete-cat="${c.id}">删除</button></span>`:''}</div>${ts.length?ts.map(t=>{const xs=state.tiers.filter(x=>x.taskId===t.id);return `<div class="task-row"><div class="row"><b>${esc(t.name)}</b>${state.editMode?`<span><button class="icon-btn" data-edit-task="${t.id}">编辑</button> <button class="icon-btn danger" data-delete-task="${t.id}">删除</button></span>`:''}</div>${state.editMode?xs.map(x=>`<div class="tier-row"><span class="tier-info">${esc(x.name)} · +${x.coins}金</span><button class="icon-btn" data-star="${x.id}">${state.favorites.includes(x.id)?'⭐':'☆'}</button><button class="icon-btn" data-edit-tier="${x.id}">编辑</button><button class="icon-btn danger" data-delete-tier="${x.id}">删除</button></div>`).join(''):`<div class="grid" style="margin-top:8px">${xs.map(taskButton).join('')}</div>`}</div>`}).join(''):'<div class="empty">该分类还没有任务</div>'}</div>`}).join('');fillSelects()}
function fillSelects(){$('taskCategory').innerHTML=state.categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');$('tierTask').innerHTML=state.tasks.map(t=>`<option value="${t.id}">${esc(cat(t.categoryId)?.name||'')} / ${esc(t.name)}</option>`).join('')}
function renderRewards(){const ta=targetAmount(),tt=total();$('customTargetWrap').style.display=state.targetMode==='custom'?'block':'none';$('customTargetInput').value=state.customTarget||'';$('goalSummary').innerHTML=`<b style="font-size:24px">${tt} / ${ta||'—'} 金</b><div class="bar" style="margin-top:8px"><i style="width:${ta?Math.min(100,tt/ta*100):0}%"></i></div>`;$('goalList').innerHTML=state.goals.map(g=>{const s=state.selectedGoalIds.includes(g.id);return `<div class="goal ${s?'selected':''}"><div class="goal-top"><label class="toggle"><input type="checkbox" data-goal="${g.id}" ${s?'checked':''}><span><b>${esc(g.name)}</b><div class="muted">${g.amount} 金</div></span></label><button class="icon-btn danger" data-delete-goal="${g.id}">删除</button></div></div>`}).join('')}
function renderStats(){const vals=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);vals.push(dayCoins(dk(d)))}$('weekCoins').textContent=vals.reduce((a,b)=>a+b,0);$('activeDays').textContent=Object.keys(state.days).filter(k=>dayCoins(k)>0).length;$('bestDay').textContent=Math.max(0,...Object.keys(state.days).map(dayCoins));$('taskTimes').textContent=Object.values(state.days).reduce((s,d)=>s+(d.records||[]).filter(r=>r.coins>0).length,0);const now=new Date(),y=now.getFullYear(),m=now.getMonth(),start=new Date(y,m,1-new Date(y,m,1).getDay());let h='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const c=dayCoins(dk(d));h+=`<button class="day ${c?'has':''}">${d.getDate()}${c?'<br><small>'+c+'</small>':''}</button>`}$('calendar').innerHTML=h}
function renderSettings(){$('dailyGoalInput').value=state.dailyGoal||''}function renderRecycle(){$('recycleList').innerHTML=state.recycle.length?state.recycle.map((x,i)=>`<div class="recycle-item"><b>${esc(x.label)}</b><div class="muted">${x.type==='category'?'分类':x.type==='task'?'任务':'档位'} · ${new Date(x.deletedAt).toLocaleDateString()}</div><div class="actions" style="margin-top:8px"><button class="btn secondary" data-restore="${i}">恢复</button><button class="btn danger" data-purge="${i}">永久删除</button></div></div>`).join(''):'<div class="empty">回收站为空</div>'}
function renderAll(){renderHeader();renderHome();renderLibrary();renderRewards();renderStats();renderSettings();renderRecycle();save()}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}function open(n){$(n+'Overlay').classList.add('open')}function close(n){$(n+'Overlay').classList.remove('open')}function go(n){document.querySelectorAll('.page').forEach(x=>x.classList.toggle('active',x.id==='page-'+n));document.querySelectorAll('[data-nav]').forEach(x=>x.classList.toggle('active',x.dataset.nav===n&&x.closest('.nav')));$('fab').style.display=n==='tasks'?'block':'none';scrollTo(0,0)}
function recycle(type,obj,extra={}){state.recycle.push({type,label:obj.name||obj.tier||'未命名',deletedAt:Date.now(),payload:clone(obj),extra:clone(extra)})}function deleteTier(id){const x=tier(id);if(!x)return;recycle('tier',x);state.tiers=state.tiers.filter(a=>a.id!==id);state.favorites=state.favorites.filter(a=>a!==id)}function deleteTask(id){const t=task(id);if(!t)return;const xs=state.tiers.filter(x=>x.taskId===id);recycle('task',t,{tiers:xs});state.tasks=state.tasks.filter(x=>x.id!==id);state.tiers=state.tiers.filter(x=>x.taskId!==id);state.favorites=state.favorites.filter(id=>!xs.some(x=>x.id===id))}function deleteCategory(id){const c=cat(id);if(!c)return;const ts=state.tasks.filter(t=>t.categoryId===id),ids=ts.map(t=>t.id),xs=state.tiers.filter(x=>ids.includes(x.taskId));recycle('category',c,{tasks:ts,tiers:xs});state.categories=state.categories.filter(x=>x.id!==id);state.tasks=state.tasks.filter(t=>t.categoryId!==id);state.tiers=state.tiers.filter(x=>!ids.includes(x.taskId));state.favorites=state.favorites.filter(id=>!xs.some(x=>x.id===id))}
function restore(i){const x=state.recycle[i];if(!x)return;if(x.type==='tier')state.tiers.push(x.payload);if(x.type==='task'){state.tasks.push(x.payload);state.tiers.push(...(x.extra.tiers||[]))}if(x.type==='category'){state.categories.push(x.payload);state.tasks.push(...(x.extra.tasks||[]));state.tiers.push(...(x.extra.tiers||[]))}state.recycle.splice(i,1);renderAll();toast('已恢复')}
document.addEventListener('click',e=>{const nav=e.target.closest('[data-nav]');if(nav)return go(nav.dataset.nav);const op=e.target.closest('[data-open]');if(op)return open(op.dataset.open);const cl=e.target.closest('[data-close]');if(cl)return close(cl.dataset.close);const p=e.target.closest('[data-punch]');if(p&&!state.editMode)return punch(p.dataset.punch);const s=e.target.closest('[data-star]');if(s){e.stopPropagation();const id=s.dataset.star;state.favorites=state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];renderAll();return}const dc=e.target.closest('[data-delete-cat]');if(dc&&confirm('删除分类及其中任务？内容会进入回收站。')){deleteCategory(dc.dataset.deleteCat);renderAll();return}const dt=e.target.closest('[data-delete-task]');if(dt&&confirm('删除任务及其档位？内容会进入回收站。')){deleteTask(dt.dataset.deleteTask);renderAll();return}const dx=e.target.closest('[data-delete-tier]');if(dx&&confirm('删除这个档位？内容会进入回收站。')){deleteTier(dx.dataset.deleteTier);renderAll();return}const ec=e.target.closest('[data-edit-cat]');if(ec){const x=cat(ec.dataset.editCat),n=prompt('分类名称',x.name);if(n?.trim()){x.name=n.trim();renderAll()}return}const et=e.target.closest('[data-edit-task]');if(et){const x=task(et.dataset.editTask),n=prompt('任务名称',x.name);if(n?.trim()){x.name=n.trim();renderAll()}return}const ex=e.target.closest('[data-edit-tier]');if(ex){const x=tier(ex.dataset.editTier),n=prompt('档位说明',x.name);if(!n?.trim())return;const c=Number(prompt('金币数',x.coins));if(c>0){x.name=n.trim();x.coins=c;renderAll()}return}const dg=e.target.closest('[data-delete-goal]');if(dg&&confirm('删除这个奖励目标？')){state.goals=state.goals.filter(x=>x.id!==dg.dataset.deleteGoal);state.selectedGoalIds=state.selectedGoalIds.filter(x=>x!==dg.dataset.deleteGoal);renderAll();return}const r=e.target.closest('[data-restore]');if(r)return restore(Number(r.dataset.restore));const q=e.target.closest('[data-purge]');if(q&&confirm('永久删除？')){state.recycle.splice(Number(q.dataset.purge),1);renderAll()}});
document.addEventListener('change',e=>{if(e.target.matches('[data-goal]')){const id=e.target.dataset.goal;state.targetMode='selected';state.selectedGoalIds=e.target.checked?[...new Set([...state.selectedGoalIds,id])]:state.selectedGoalIds.filter(x=>x!==id);renderAll()}});$('toggleEdit').onclick=()=>{state.editMode=!state.editMode;renderAll()};$('undoLast').onclick=undoLast;$('categoryForm').onsubmit=e=>{e.preventDefault();state.categories.push({id:uid('c'),name:$('categoryName').value.trim(),order:state.categories.length+1});e.target.reset();close('category');renderAll();toast('分类已添加')};$('taskForm').onsubmit=e=>{e.preventDefault();state.tasks.push({id:uid('t'),categoryId:$('taskCategory').value,name:$('taskName').value.trim(),order:state.tasks.filter(x=>x.categoryId===$('taskCategory').value).length+1});e.target.reset();close('task');renderAll();toast('任务已添加')};$('tierForm').onsubmit=e=>{e.preventDefault();state.tiers.push({id:uid('x'),taskId:$('tierTask').value,name:$('tierName').value.trim(),coins:Number($('tierCoins').value)});e.target.reset();close('tier');renderAll();toast('档位已添加')};$('goalForm').onsubmit=e=>{e.preventDefault();const id=uid('g');state.goals.push({id,name:$('goalName').value.trim(),amount:Number($('goalAmount').value)});state.selectedGoalIds.push(id);state.targetMode='selected';e.target.reset();close('goal');renderAll()};$('modeSelected').onclick=()=>{state.targetMode='selected';renderAll()};$('modeCustom').onclick=()=>{state.targetMode='custom';renderAll()};$('saveCustomTarget').onclick=()=>{state.customTarget=Number($('customTargetInput').value)||null;state.targetMode='custom';renderAll();toast('已保存')};$('saveDailyGoal').onclick=()=>{state.dailyGoal=Number($('dailyGoalInput').value)||null;renderAll();toast('已保存')};$('exportBtn').onclick=()=>{const u=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download='人生游戏化备份_'+dk()+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),500)};$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{if(confirm('导入会覆盖当前数据，继续吗？')){state=normalize(JSON.parse(t));renderAll();toast('导入成功')}}).catch(()=>alert('文件格式不正确')).finally(()=>e.target.value='')};$('resetBtn').onclick=()=>{if(confirm('确定重置全部数据？')){state=clone(DEFAULT);renderAll()}};document.querySelectorAll('.overlay').forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.remove('open')});renderAll();go('home');window.__lifeGameReady=true;
})();
</script></body></html>
