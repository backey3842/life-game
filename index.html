<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ed8a3d">
<title>人生游戏化 4.0</title>
<style>
:root{--bg:#fff8ef;--card:#fffdf9;--ink:#3f342d;--muted:#8b786b;--line:#efd8bf;--brand:#ed8a3d;--brand2:#d96f22;--gold:#f2bb43;--green:#6faf7d;--red:#d65f5f;--shadow:0 10px 28px rgba(93,63,37,.10)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#fff5e8 0,#fffaf4 45%,#f6f3ef 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}button,input,select{font:inherit}button{cursor:pointer}.app{max-width:760px;margin:auto;padding:14px 14px 98px}.hero{position:relative;overflow:hidden;border:1px solid #f3c686;border-radius:26px;padding:18px;background:linear-gradient(135deg,#fff1d5,#ffd49e);box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;width:160px;height:160px;border-radius:50%;right:-48px;top:-62px;background:rgba(255,255,255,.34)}.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:center;position:relative;z-index:1}.hero-title{font-size:23px;font-weight:900}.hero-date{font-size:12px;color:var(--muted);margin-top:3px}.avatar{width:64px;height:64px;border-radius:20px;background:#fff8eb;border:1px solid #f2c986;display:grid;place-items:center;font-size:38px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:15px;position:relative;z-index:1}.metric{padding:10px 6px;border-radius:16px;background:rgba(255,255,255,.74);text-align:center}.metric b{display:block;font-size:20px}.metric span{font-size:11px;color:var(--muted)}.level{margin-top:12px;position:relative;z-index:1}.barline{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;margin-bottom:6px}.bar{height:10px;border-radius:999px;background:#efe2d4;overflow:hidden}.bar>i{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--brand),var(--gold));transition:width .25s ease}.page{display:none}.page.active{display:block}.section{margin-top:16px}.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 3px 8px}.section-head h2{font-size:18px;margin:0}.text-btn{border:0;background:transparent;color:var(--brand2);font-weight:800;padding:6px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 7px 20px rgba(93,63,37,.055)}.progress-block+.progress-block{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.task-group{margin-bottom:12px}.group-title{font-weight:850;margin:1px 2px 8px}.task-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.task{position:relative;min-height:76px;text-align:left;border:1px solid #efd5b8;border-radius:16px;background:#fffaf3;padding:12px 48px 12px 12px;color:var(--ink);transition:transform .12s,background .12s}.task:active{transform:scale(.97);background:#ffeed8}.task strong{display:block;font-size:14px;line-height:1.35}.task small{display:block;color:var(--muted);margin-top:4px}.task .coin{position:absolute;right:10px;bottom:10px;color:#ad6516;font-weight:900}.task.selected{border-color:var(--green);background:#eef8f0}.record{display:flex;align-items:center;gap:10px;padding:10px 1px;border-bottom:1px dashed var(--line)}.record:last-child{border-bottom:0}.record-main{flex:1;min-width:0}.record-main b{display:block;font-size:13px}.record-main small{color:var(--muted)}.mini-btn{border:0;border-radius:10px;padding:7px 9px}.undo{background:#fff0ee;color:var(--red)}.empty{text-align:center;padding:24px;color:var(--muted)}.goal{border:1px solid var(--line);border-radius:16px;background:#fffaf5;padding:12px;margin-bottom:10px}.goal.selected{border-color:#edaa65;background:#fff1df}.goal-top{display:flex;align-items:center;gap:10px}.goal input[type=checkbox]{width:22px;height:22px;accent-color:var(--brand)}.goal-info{flex:1}.goal-info b{display:block}.goal-info small{color:var(--muted)}.goal-delete{border:0;background:transparent;color:var(--red)}.modes{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mode{border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px}.mode.active{border-color:var(--brand);background:#fff0dc;font-weight:850}.big{font-size:25px;font-weight:900;margin:8px 0}.form-row{margin-bottom:12px}.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}.form-row input,.form-row select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:850}.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}.secondary{background:#f4e9de;color:var(--ink)}.danger{background:#fff0ee;color:var(--red)}.full{width:100%}.actions{display:flex;gap:9px;flex-wrap:wrap}.note{font-size:12px;line-height:1.55;color:var(--muted)}.calendar-head{display:flex;align-items:center;justify-content:space-between}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}.dow,.day{text-align:center;font-size:12px}.dow{color:var(--muted);padding:4px}.day{border:1px solid transparent;border-radius:11px;background:#f7f0e9;min-height:44px;padding:5px 2px;color:var(--ink)}.day.has{background:#f8d5a9;border-color:#eeb36e;font-weight:800}.day.today{outline:2px solid var(--brand2)}.day.other{opacity:.35}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{text-align:center}.stat b{display:block;font-size:23px}.chart{height:155px;display:flex;align-items:flex-end;gap:7px;padding-top:20px}.col{flex:1;text-align:center;color:var(--muted);font-size:10px}.col i{display:block;min-height:3px;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,var(--gold),var(--brand));margin-bottom:5px}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(760px,100%);display:grid;grid-template-columns:repeat(5,1fr);z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:7px 4px calc(7px + env(safe-area-inset-bottom))}.nav button{border:0;background:transparent;color:var(--muted);padding:5px 2px;font-size:10px}.nav button span{display:block;font-size:21px}.nav button.active{color:var(--brand2);font-weight:850}.fab{position:fixed;right:max(18px,calc((100vw - 760px)/2 + 18px));bottom:82px;width:56px;height:56px;border:0;border-radius:50%;background:var(--brand2);color:#fff;font-size:28px;box-shadow:var(--shadow);z-index:20}.overlay{position:fixed;inset:0;background:rgba(42,31,23,.46);z-index:90;display:none;align-items:flex-end;justify-content:center}.overlay.open{display:flex}.sheet{width:min(760px,100%);max-height:88vh;overflow:auto;background:#fffaf5;border-radius:24px 24px 0 0;padding:18px 16px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(0,0,0,.16)}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.sheet-head h3{margin:0}.close{border:0;background:#f2e7dc;border-radius:50%;width:34px;height:34px}.toast{position:fixed;top:18px;left:50%;transform:translate(-50%,-120%);z-index:120;background:#3f352e;color:white;padding:10px 16px;border-radius:999px;box-shadow:var(--shadow);transition:.22s}.toast.show{transform:translate(-50%,0)}.float{position:fixed;z-index:130;pointer-events:none;color:#ce741d;font-weight:900;animation:fly .75s ease-out forwards}@keyframes fly{to{transform:translateY(-70px) scale(1.35);opacity:0}}@media(min-width:680px){.app{padding-top:24px}.task-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.stats{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app">
<header class="hero">
  <div class="hero-top"><div><div class="hero-title">人生游戏化 4.0</div><div id="dateText" class="hero-date"></div></div><div id="avatar" class="avatar">🌱</div></div>
  <div class="metrics"><div class="metric"><b id="todayCoins">0</b><span>今日金币</span></div><div class="metric"><b id="totalCoins">0</b><span>累计金币</span></div><div class="metric"><b id="streak">0天</b><span>连续打卡</span></div></div>
  <div class="level"><div class="barline"><span id="levelText">Lv.1 新手</span><span id="xpText">0/100 XP</span></div><div class="bar"><i id="xpBar"></i></div></div>
</header>

<main>
<section id="page-home" class="page active">
  <div class="section"><div class="section-head"><h2>🎯 今日进度</h2><button class="text-btn" data-nav="settings">设置</button></div><div class="card">
    <div class="progress-block"><div class="barline"><span id="dailyGoalText">今日目标暂未设置</span><span id="dailyGoalPct"></span></div><div id="dailyGoalWrap" class="bar"><i id="dailyGoalBar"></i></div></div>
    <div class="progress-block"><div class="barline"><span id="targetText">奖励目标</span><span id="targetNumber"></span></div><div class="bar"><i id="targetBar"></i></div></div>
  </div></div>
  <div class="section"><div class="section-head"><h2>⚡ 快速打卡</h2><button class="text-btn" data-nav="tasks">全部任务</button></div><div id="quickTasks" class="card"></div></div>
  <div class="section"><div class="section-head"><h2>📝 今日记录</h2></div><div id="todayRecords" class="card"></div></div>
</section>

<section id="page-tasks" class="page">
  <div class="section"><div class="section-head"><h2>✅ 日常任务</h2><button class="text-btn" data-open="task">＋ 添加任务</button></div><div id="taskList"></div></div>
  <div class="section"><div class="section-head"><h2>🌙 睡前任务</h2><span class="note">整组每日封顶18金</span></div><div id="sleepList" class="card"></div></div>
</section>

<section id="page-rewards" class="page">
  <div class="section"><div class="section-head"><h2>🎁 奖励目标</h2><button class="text-btn" data-open="goal">＋ 添加奖励</button></div>
    <div class="card"><div class="modes"><button id="selectedMode" class="mode">勾选目标合计</button><button id="customMode" class="mode">自定义金额</button></div><div id="customTargetBox" style="display:none;margin-top:12px"><div class="form-row"><label>总目标金额</label><input id="customTargetInput" type="number" min="1" placeholder="例如 3000"></div><button id="saveCustomTarget" class="btn primary full">保存总目标</button></div><div style="height:1px;background:var(--line);margin:14px 0"></div><div id="goalSummary"></div></div>
  </div>
  <div class="section"><div id="goalList"></div></div>
</section>

<section id="page-calendar" class="page">
  <div class="section"><div class="section-head"><h2>📅 打卡日历</h2></div><div class="card"><div class="calendar-head"><button id="prevMonth" class="mini-btn secondary">‹</button><b id="monthTitle"></b><button id="nextMonth" class="mini-btn secondary">›</button></div><div id="calendarGrid" class="calendar"></div></div></div>
  <div class="section"><div id="calendarDetail" class="card empty">点击日期查看当天记录</div></div>
</section>

<section id="page-stats" class="page">
  <div class="section"><div class="section-head"><h2>📊 数据统计</h2></div><div class="stats"><div class="card stat"><b id="weekCoins">0</b><span>近7天金币</span></div><div class="card stat"><b id="activeDays">0</b><span>累计活跃天</span></div><div class="card stat"><b id="bestDay">0</b><span>最佳单日</span></div><div class="card stat"><b id="taskTimes">0</b><span>累计打卡次数</span></div></div></div>
  <div class="section"><div class="section-head"><h2>最近7天</h2></div><div id="chart" class="card chart"></div></div>
  <div class="section"><div class="section-head"><h2>🌱 成长伙伴</h2></div><div class="card" style="display:flex;gap:14px;align-items:center"><div id="pet" class="avatar">🌱</div><div><b id="petName">萌芽</b><div id="petDesc" class="note" style="margin-top:5px"></div></div></div></div>
</section>

<section id="page-settings" class="page">
  <div class="section"><div class="section-head"><h2>⚙️ 设置</h2></div><div class="card"><div class="form-row"><label>今日目标金币（可以留空）</label><input id="dailyGoalInput" type="number" min="1" placeholder="暂不设置"></div><button id="saveDailyGoal" class="btn primary full">保存今日目标</button></div></div>
  <div class="section"><div class="section-head"><h2>数据备份</h2></div><div class="card"><div class="actions"><button id="exportBtn" class="btn secondary">导出 JSON</button><button id="importBtn" class="btn secondary">导入 JSON</button><input id="importFile" type="file" accept="application/json" hidden></div><p class="note">手机和电脑暂时不会自动同步。可用 JSON 文件手动迁移数据。</p></div></div>
  <div class="section"><div class="section-head"><h2>危险操作</h2></div><div class="card"><button id="resetBtn" class="btn danger">重置全部数据</button></div></div>
</section>
</main>
</div>

<button id="fab" class="fab" data-open="task" aria-label="添加任务">＋</button>
<nav class="nav"><button class="active" data-nav="home"><span>🏠</span>首页</button><button data-nav="tasks"><span>✅</span>任务</button><button data-nav="rewards"><span>🎁</span>奖励</button><button data-nav="calendar"><span>📅</span>日历</button><button data-nav="stats"><span>📊</span>统计</button></nav>

<div id="taskOverlay" class="overlay"><div class="sheet"><div class="sheet-head"><h3>添加自定义任务</h3><button class="close" data-close="task">×</button></div><form id="taskForm"><div class="form-row"><label>任务分类</label><input id="taskGroup" required placeholder="例如：整理房间"></div><div class="form-row"><label>档位说明</label><input id="taskTier" required placeholder="例如：20分钟"></div><div class="form-row"><label>奖励金币</label><input id="taskCoins" type="number" min="1" required placeholder="例如：8"></div><button class="btn primary full" type="submit">保存任务</button></form></div></div>
<div id="goalOverlay" class="overlay"><div class="sheet"><div class="sheet-head"><h3>添加奖励目标</h3><button class="close" data-close="goal">×</button></div><form id="goalForm"><div class="form-row"><label>奖励名称</label><input id="goalName" required placeholder="例如：降噪耳机"></div><div class="form-row"><label>目标金额</label><input id="goalAmount" type="number" min="1" required placeholder="例如：1200"></div><button class="btn primary full" type="submit">保存奖励</button></form></div></div>

<script>
(function(){
'use strict';
var STORAGE_KEY='lifeGamifiedCheckin_v1';
var CAP=18;
var DEFAULT_TASKS=[
['运动（自己练）','20分钟',10],['运动（自己练）','40分钟',20],['运动（私教/跟练）','1.5小时',20],['看书','10分钟',5],['看书','30分钟',15],['学习（主动思考/刷题）','15分钟',10],['学习（主动思考/刷题）','30分钟',18],['学习（看视频被动输入）','30分钟',5],['学习（看视频被动输入）','60分钟',8],['看长视频','1节',3],['看长视频','2节',5],['烧饭','一荤一素',6],['烧饭','三菜一汤',15],['烧饭','快手一锅出',5],['缝纫衣服一件','完成1件',50],['拼图一个','完成1个',30]
].map(function(x,i){return{id:'base_'+i,group:x[0],tier:x[1],coins:x[2],builtin:true};});
var SLEEP=[
{id:'wash22',group:'刷牙 + 洗澡',tier:'22:00前开始',coins:3,type:'wash'},
{id:'wash21',group:'刷牙 + 洗澡',tier:'21:00前开始',coins:5,type:'wash',early:true},
{id:'sleep23',group:'睡觉',tier:'23:00前',coins:3,type:'sleep'},
{id:'sleep2230',group:'睡觉',tier:'22:30前',coins:8,type:'sleep'},
{id:'sleep22',group:'睡觉',tier:'22:00前',coins:12,type:'sleep'}
];
var DEFAULT_STATE={dailyGoal:null,targetMode:'selected',customTotalTarget:null,selectedGoalIds:['goal_washer','goal_disk'],goals:[{id:'goal_washer',name:'内衣洗衣烘干机',amount:800},{id:'goal_disk',name:'电脑重装换硬盘',amount:400}],customTasks:[],days:{}};
var state=loadState();
var viewDate=new Date();
function $(id){return document.getElementById(id);}
function clone(x){return JSON.parse(JSON.stringify(x));}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function normalize(raw){var d=clone(DEFAULT_STATE);if(!raw||typeof raw!=='object')return d;d.dailyGoal=Number(raw.dailyGoal)>0?Number(raw.dailyGoal):null;d.targetMode=raw.targetMode==='custom'?'custom':'selected';d.customTotalTarget=Number(raw.customTotalTarget)>0?Number(raw.customTotalTarget):null;d.goals=Array.isArray(raw.goals)?raw.goals:d.goals;d.selectedGoalIds=Array.isArray(raw.selectedGoalIds)?raw.selectedGoalIds:d.selectedGoalIds;d.customTasks=Array.isArray(raw.customTasks)?raw.customTasks:[];d.days=raw.days&&typeof raw.days==='object'?raw.days:{};return d;}
function loadState(){try{return normalize(JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'));}catch(e){return clone(DEFAULT_STATE);}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function dateKey(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureDay(k){k=k||dateKey();if(!state.days[k])state.days[k]={records:[],sleepSelections:{wash:null,sleep:null}};if(!Array.isArray(state.days[k].records))state.days[k].records=[];if(!state.days[k].sleepSelections)state.days[k].sleepSelections={wash:null,sleep:null};return state.days[k];}
function dayCoins(k){var d=state.days[k];return d&&Array.isArray(d.records)?d.records.reduce(function(s,r){return s+Number(r.coins||0);},0):0;}
function totalCoins(){return Object.keys(state.days).reduce(function(s,k){return s+dayCoins(k);},0);}
function allTasks(){return DEFAULT_TASKS.concat(state.customTasks);}
function targetAmount(){if(state.targetMode==='custom')return Number(state.customTotalTarget||0);return state.goals.filter(function(g){return state.selectedGoalIds.indexOf(g.id)>=0;}).reduce(function(s,g){return s+Number(g.amount||0);},0);}
function addRecord(data){var d=ensureDay();d.records.unshift(Object.assign({recordId:Date.now()+'_'+Math.random().toString(36).slice(2),time:Date.now()},data));save();}
function showToast(text){var el=$('toast');el.textContent=text;el.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(function(){el.classList.remove('show');},1700);}
function coinFloat(evt,n){var el=document.createElement('div');el.className='float';el.textContent=(n>=0?'+':'')+n+' 金';el.style.left=((evt&&evt.clientX)||window.innerWidth/2)+'px';el.style.top=((evt&&evt.clientY)||window.innerHeight/2)+'px';document.body.appendChild(el);setTimeout(function(){el.remove();},800);if(navigator.vibrate)navigator.vibrate(30);}
function punchTask(id,evt){var t=allTasks().find(function(x){return x.id===id;});if(!t)return;addRecord({taskId:t.id,name:t.group,tier:t.tier,coins:t.coins,category:'daily'});coinFloat(evt,t.coins);showToast(t.group+' +'+t.coins+'金');renderAll();}
function syncSleepBonus(){var d=ensureDay();var w=SLEEP.find(function(x){return x.id===d.sleepSelections.wash;});var s=SLEEP.find(function(x){return x.id===d.sleepSelections.sleep;});var has=d.records.some(function(r){return r.taskId==='sleep_bonus';});if(w&&w.early&&s&&!has)d.records.unshift({recordId:'bonus_'+Date.now(),time:Date.now(),taskId:'sleep_bonus',name:'联动彩蛋',tier:'早洗 + 早睡',coins:1,category:'sleep'});if(!(w&&w.early&&s)&&has)d.records=d.records.filter(function(r){return r.taskId!=='sleep_bonus';});}
function enforceSleepCap(){var d=ensureDay();var sum=0;d.records.filter(function(r){return r.category==='sleep';}).sort(function(a,b){return a.time-b.time;}).forEach(function(r){var left=Math.max(0,CAP-sum);r.coins=Math.min(Number(r.coins||0),left);sum+=Number(r.coins||0);});}
function punchSleep(id,evt){var t=SLEEP.find(function(x){return x.id===id;});if(!t)return;var d=ensureDay();var old=SLEEP.find(function(x){return x.id===d.sleepSelections[t.type];});if(old&&old.id===t.id){showToast('这个档位今天已经打卡');return;}if(old)d.records=d.records.filter(function(r){return r.taskId!==old.id;});d.sleepSelections[t.type]=t.id;d.records.unshift({recordId:Date.now()+'_'+Math.random().toString(36).slice(2),time:Date.now(),taskId:t.id,name:t.group,tier:t.tier,coins:t.coins,category:'sleep'});syncSleepBonus();enforceSleepCap();save();coinFloat(evt,t.coins-(old?old.coins:0));renderAll();}
function undoRecord(id){var d=ensureDay();var r=d.records.find(function(x){return x.recordId===id;});d.records=d.records.filter(function(x){return x.recordId!==id;});var st=r&&SLEEP.find(function(x){return x.id===r.taskId;});if(st)d.sleepSelections[st.type]=null;syncSleepBonus();enforceSleepCap();save();renderAll();showToast('已撤销');}
function streak(){var d=new Date(),n=0;if(dayCoins(dateKey(d))===0)d.setDate(d.getDate()-1);while(dayCoins(dateKey(d))>0){n++;d.setDate(d.getDate()-1);}return n;}
function taskHTML(t){return '<button class="task" data-task="'+esc(t.id)+'"><strong>'+esc(t.group)+'</strong><small>'+esc(t.tier)+'</small><span class="coin">+'+Number(t.coins)+'金</span></button>';}
function renderHeader(){var t=totalCoins(),today=dayCoins(dateKey()),lv=Math.floor(t/100)+1,xp=t%100;$('todayCoins').textContent=today;$('totalCoins').textContent=t;$('streak').textContent=streak()+'天';$('levelText').textContent='Lv.'+lv+' '+(lv<3?'新手':lv<7?'探索者':lv<15?'坚持者':'人生玩家');$('xpText').textContent=xp+'/100 XP';$('xpBar').style.width=xp+'%';$('dateText').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});}
function renderHome(){var today=dayCoins(dateKey()),dg=Number(state.dailyGoal||0);$('dailyGoalText').textContent=dg?'今日目标 '+today+'/'+dg+' 金':'今日目标暂未设置';$('dailyGoalPct').textContent=dg?Math.min(100,Math.round(today/dg*100))+'%':'';$('dailyGoalWrap').style.display=dg?'block':'none';$('dailyGoalBar').style.width=(dg?Math.min(100,today/dg*100):0)+'%';var target=targetAmount(),total=totalCoins();$('targetText').textContent=state.targetMode==='custom'?'自定义总目标':'已选奖励目标合计';$('targetNumber').textContent=target?total+'/'+target+' 金':'暂未设置';$('targetBar').style.width=(target?Math.min(100,total/target*100):0)+'%';$('quickTasks').innerHTML='<div class="task-grid">'+allTasks().slice(0,6).map(taskHTML).join('')+'</div>';renderRecords();}
function renderRecords(){var rs=ensureDay().records;$('todayRecords').innerHTML=rs.length?rs.map(function(r){return '<div class="record"><div class="record-main"><b>'+esc(r.name)+' · '+esc(r.tier)+'</b><small>'+new Date(r.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})+' · +'+Number(r.coins)+'金</small></div><button class="mini-btn undo" data-undo="'+esc(r.recordId)+'">撤销</button></div>';}).join(''):'<div class="empty">今天还没有打卡，先完成一个小任务吧 🌟</div>';}
function renderTasks(){var groups={};allTasks().forEach(function(t){if(!groups[t.group])groups[t.group]=[];groups[t.group].push(t);});$('taskList').innerHTML=Object.keys(groups).map(function(g){return '<div class="card task-group"><div class="group-title">'+esc(g)+'</div><div class="task-grid">'+groups[g].map(taskHTML).join('')+'</div></div>';}).join('');var d=ensureDay();$('sleepList').innerHTML='<div class="task-grid">'+SLEEP.map(function(t){return '<button class="task '+(d.sleepSelections[t.type]===t.id?'selected':'')+'" data-sleep="'+t.id+'"><strong>'+esc(t.group)+'</strong><small>'+esc(t.tier)+'</small><span class="coin">+'+t.coins+'金</span></button>';}).join('')+'</div>';}
function renderRewards(){var active=state.targetMode;$('selectedMode').classList.toggle('active',active==='selected');$('customMode').classList.toggle('active',active==='custom');$('customTargetBox').style.display=active==='custom'?'block':'none';$('customTargetInput').value=state.customTotalTarget||'';var target=targetAmount(),total=totalCoins();$('goalSummary').innerHTML='<div class="big">'+total+' / '+(target||'—')+' 金</div><div class="bar"><i style="width:'+(target?Math.min(100,total/target*100):0)+'%"></i></div><p class="note">'+(active==='selected'?'勾选多个奖励目标后，金额会自动相加。':'使用你填写的金额作为当前总目标。')+'</p>';$('goalList').innerHTML=state.goals.length?state.goals.map(function(g){var selected=state.selectedGoalIds.indexOf(g.id)>=0;return '<div class="goal '+(selected?'selected':'')+'" data-goal-row="'+esc(g.id)+'"><div class="goal-top"><input type="checkbox" data-goal="'+esc(g.id)+'" '+(selected?'checked':'')+'><div class="goal-info"><b>'+esc(g.name)+'</b><small>'+Number(g.amount)+' 金</small></div><button class="goal-delete" data-delete-goal="'+esc(g.id)+'">删除</button></div><div class="bar" style="margin-top:9px"><i style="width:'+Math.min(100,total/Number(g.amount||1)*100)+'%"></i></div></div>';}).join(''):'<div class="card empty">还没有奖励目标</div>';}
function renderCalendar(){var y=viewDate.getFullYear(),m=viewDate.getMonth();$('monthTitle').textContent=y+'年'+(m+1)+'月';var start=new Date(y,m,1-new Date(y,m,1).getDay());var html=['日','一','二','三','四','五','六'].map(function(x){return '<div class="dow">'+x+'</div>';}).join('');for(var i=0;i<42;i++){var d=new Date(start);d.setDate(start.getDate()+i);var k=dateKey(d),c=dayCoins(k);html+='<button class="day '+(d.getMonth()!==m?'other ':'')+(c>0?'has ':'')+(k===dateKey()?'today':'')+'" data-date="'+k+'">'+d.getDate()+(c>0?'<br><small>'+c+'</small>':'')+'</button>';} $('calendarGrid').innerHTML=html;}
function showDate(k){var rs=(state.days[k]&&state.days[k].records)||[];$('calendarDetail').classList.remove('empty');$('calendarDetail').innerHTML='<b>'+k+' · '+dayCoins(k)+' 金</b>'+(rs.length?rs.map(function(r){return '<div style="margin-top:8px">'+esc(r.name)+' · '+esc(r.tier)+'　+'+Number(r.coins)+'</div>';}).join(''):'<div style="margin-top:8px;color:var(--muted)">当天没有记录</div>');}
function renderStats(){var arr=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);arr.push({d:d,c:dayCoins(dateKey(d))});}var max=Math.max.apply(null,[1].concat(arr.map(function(x){return x.c;})));$('weekCoins').textContent=arr.reduce(function(s,x){return s+x.c;},0);$('activeDays').textContent=Object.keys(state.days).filter(function(k){return dayCoins(k)>0;}).length;$('bestDay').textContent=Math.max.apply(null,[0].concat(Object.keys(state.days).map(dayCoins)));$('taskTimes').textContent=Object.keys(state.days).reduce(function(s,k){return s+((state.days[k].records||[]).length);},0);$('chart').innerHTML=arr.map(function(x){return '<div class="col"><i style="height:'+Math.max(3,x.c/max*110)+'px"></i>'+(x.d.getMonth()+1)+'/'+x.d.getDate()+'<br>'+x.c+'</div>';}).join('');var t=totalCoins(),stage=t<100?['🌱','萌芽','完成任务，让它慢慢长大。']:t<300?['🌿','小苗','你的节奏正在形成。']:t<800?['🌳','成长树','坚持正在变成稳定的力量。']:t<1500?['🏡','温暖小屋','你的生活系统越来越完整。']:['🏰','人生城堡','你已经成为长期主义玩家。'];$('pet').textContent=stage[0];$('avatar').textContent=stage[0];$('petName').textContent=stage[1];$('petDesc').textContent=stage[2];}
function renderSettings(){$('dailyGoalInput').value=state.dailyGoal||'';}
function renderAll(){renderHeader();renderHome();renderTasks();renderRewards();renderCalendar();renderStats();renderSettings();}
function go(page){document.querySelectorAll('.page').forEach(function(el){el.classList.toggle('active',el.id==='page-'+page);});document.querySelectorAll('[data-nav]').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-nav')===page&&el.closest('.nav'));});$('fab').style.display=page==='tasks'?'block':'none';window.scrollTo(0,0);}
function openSheet(type){$(type+'Overlay').classList.add('open');}
function closeSheet(type){$(type+'Overlay').classList.remove('open');}

document.addEventListener('click',function(e){var nav=e.target.closest('[data-nav]');if(nav){go(nav.getAttribute('data-nav'));return;}var opener=e.target.closest('[data-open]');if(opener){openSheet(opener.getAttribute('data-open'));return;}var closer=e.target.closest('[data-close]');if(closer){closeSheet(closer.getAttribute('data-close'));return;}var task=e.target.closest('[data-task]');if(task){punchTask(task.getAttribute('data-task'),e);return;}var sleep=e.target.closest('[data-sleep]');if(sleep){punchSleep(sleep.getAttribute('data-sleep'),e);return;}var undo=e.target.closest('[data-undo]');if(undo){undoRecord(undo.getAttribute('data-undo'));return;}var date=e.target.closest('[data-date]');if(date){showDate(date.getAttribute('data-date'));return;}var del=e.target.closest('[data-delete-goal]');if(del){e.stopPropagation();var id=del.getAttribute('data-delete-goal');if(confirm('删除这个奖励目标？')){state.goals=state.goals.filter(function(g){return g.id!==id;});state.selectedGoalIds=state.selectedGoalIds.filter(function(x){return x!==id;});save();renderAll();}return;}var row=e.target.closest('[data-goal-row]');if(row&&!e.target.matches('input')){var cb=row.querySelector('input[type=checkbox]');cb.checked=!cb.checked;cb.dispatchEvent(new Event('change',{bubbles:true}));}});
document.addEventListener('change',function(e){if(e.target.matches('[data-goal]')){var id=e.target.getAttribute('data-goal');state.targetMode='selected';if(e.target.checked&&state.selectedGoalIds.indexOf(id)<0)state.selectedGoalIds.push(id);if(!e.target.checked)state.selectedGoalIds=state.selectedGoalIds.filter(function(x){return x!==id;});save();renderAll();}});
$('taskForm').addEventListener('submit',function(e){e.preventDefault();var group=$('taskGroup').value.trim(),tier=$('taskTier').value.trim(),coins=Number($('taskCoins').value);if(!group||!tier||coins<=0)return;state.customTasks.push({id:'custom_'+Date.now(),group:group,tier:tier,coins:coins,builtin:false});save();this.reset();closeSheet('task');renderAll();showToast('自定义任务已添加');});
$('goalForm').addEventListener('submit',function(e){e.preventDefault();var name=$('goalName').value.trim(),amount=Number($('goalAmount').value);if(!name||amount<=0)return;var id='goal_'+Date.now();state.goals.push({id:id,name:name,amount:amount});state.selectedGoalIds.push(id);state.targetMode='selected';save();this.reset();closeSheet('goal');renderAll();showToast('奖励目标已添加');});
$('selectedMode').addEventListener('click',function(){state.targetMode='selected';save();renderAll();});
$('customMode').addEventListener('click',function(){state.targetMode='custom';save();renderAll();});
$('saveCustomTarget').addEventListener('click',function(){var n=Number($('customTargetInput').value);state.customTotalTarget=n>0?n:null;state.targetMode='custom';save();renderAll();showToast('总目标已保存');});
$('saveDailyGoal').addEventListener('click',function(){var n=Number($('dailyGoalInput').value);state.dailyGoal=n>0?n:null;save();renderAll();showToast('今日目标已保存');});
$('prevMonth').addEventListener('click',function(){viewDate.setMonth(viewDate.getMonth()-1);renderCalendar();});
$('nextMonth').addEventListener('click',function(){viewDate.setMonth(viewDate.getMonth()+1);renderCalendar();});
$('exportBtn').addEventListener('click',function(){var url=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));var a=document.createElement('a');a.href=url;a.download='人生游戏化备份_'+dateKey()+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},500);});
$('importBtn').addEventListener('click',function(){$('importFile').click();});
$('importFile').addEventListener('change',function(e){var file=e.target.files&&e.target.files[0];if(!file)return;file.text().then(function(text){var parsed=JSON.parse(text);if(confirm('导入会覆盖当前数据，继续吗？')){state=normalize(parsed);save();renderAll();showToast('导入成功');}}).catch(function(){alert('文件格式不正确');}).finally(function(){e.target.value='';});});
$('resetBtn').addEventListener('click',function(){if(confirm('确定重置全部数据？此操作无法撤销。')){state=clone(DEFAULT_STATE);save();renderAll();showToast('数据已重置');}});
document.querySelectorAll('.overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});});
renderAll();go('home');
window.__lifeGameReady=true;
})();
</script>
</body>
